name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Lint, build & test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build CSS
        run: npm run css:build

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: switchboard:ci
          build-args: |
            SWITCHBOARD_COMMIT=${{ github.sha }}
            SWITCHBOARD_BUILD=${{ github.run_id }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
