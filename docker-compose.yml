services:
  switchboard:
    build:
      context: .
      args:
        SWITCHBOARD_COMMIT: ${SWITCHBOARD_COMMIT:-}
        SWITCHBOARD_BUILD: ${SWITCHBOARD_BUILD:-local}
        SWITCHBOARD_VERSION: ${SWITCHBOARD_VERSION:-}
    ports:
      - "8080:8080"
      - "8443:8443"
      - "80:80"
      - "443:443"
    volumes:
      - ./data:/app/data
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: production
      SWITCHBOARD_UPSTREAM_HOST: ${SWITCHBOARD_UPSTREAM_HOST:-host.docker.internal}
      SWITCHBOARD_COMMIT: ${SWITCHBOARD_COMMIT:-}
      SWITCHBOARD_BUILD: ${SWITCHBOARD_BUILD:-local}
      SWITCHBOARD_VERSION: ${SWITCHBOARD_VERSION:-}
    cap_add:
      - NET_BIND_SERVICE
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8080/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
