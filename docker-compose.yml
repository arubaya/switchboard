services:
  switchboard:
    build: .
    ports:
      - "8080:8080"
      - "8443:8443"
      - "80:80"
      - "443:443"
    volumes:
      - ./data:/app/data
    environment:
      NODE_ENV: production
    cap_add:
      - NET_BIND_SERVICE
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8080/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
